<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Driver – Zonal Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            margin: 0;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
        }

        .header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-logo {
            width: 32px; height: 32px;
            background: #1f6feb;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
        }
        .header h2 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
            color: #e6edf3;
        }
        .back-link {
            color: #8b949e;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.15s;
        }
        .back-link:hover { color: #e6edf3; }

        .container { 
            max-width: 600px;
            margin: 24px auto;
            padding: 0 32px; 
        }

        .alert-error {
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid;
            background: rgba(248, 81, 73, 0.1);
            border-color: rgba(248, 81, 73, 0.3);
            color: #f85149;
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 24px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #e6edf3;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #8b949e;
            margin-bottom: 8px;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e6edf3;
            font-size: 13px;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #1f6feb;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-primary {
            background: #238636;
            border-color: #2ea043;
            color: #fff;
        }
        .btn-primary:hover { background: #2ea043; }
        .btn-secondary {
            background: #21262d;
            border-color: #30363d;
            color: #8b949e;
            text-decoration: none;
            display: inline-block;
        }
        .btn-secondary:hover { 
            background: #30363d;
            color: #e6edf3;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }

        .help-text {
            font-size: 12px;
            color: #8b949e;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <div class="header-logo">➕</div>
        <h2>Add New Driver</h2>
    </div>
    <a href="{% url 'manage-drivers' %}" class="back-link">← Back to Drivers</a>
</div>

<div class="container">

    {% if error %}
    <div class="alert-error">{{ error }}</div>
    {% endif %}

    <div class="card">
        <div class="card-title">👨‍✈️ Driver Information</div>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label for="first_name">First Name *</label>
                <input type="text" id="first_name" name="first_name" required>
            </div>

            <div class="form-group">
                <label for="last_name">Last Name *</label>
                <input type="text" id="last_name" name="last_name" required>
            </div>

            <div class="form-group">
                <label for="email">Email (Optional)</label>
                <input type="email" id="email" name="email">
            </div>

            <div class="form-group">
                <label for="username">Username *</label>
                <input type="text" id="username" name="username" required>
                <div class="help-text">Used for login. Must be unique.</div>
            </div>

            <div class="form-group">
                <label for="password">Password *</label>
                <input type="password" id="password" name="password" required>
                <div class="help-text">Minimum 8 characters recommended.</div>
            </div>

            <div class="form-group">
                <label for="permanent_bus">Permanent Bus Assignment *</label>
                <select id="permanent_bus" name="permanent_bus" required>
                    <option value="">Select a bus...</option>
                    {% for bus in available_buses %}
                    <option value="{{ bus.id }}">
                        {{ bus.number_plate }} (Capacity: {{ bus.capacity }})
                    </option>
                    {% endfor %}
                </select>
                <div class="help-text">
                    This driver will always drive this bus. Only unassigned buses are shown.
                </div>
            </div>

            <div class="btn-row">
                <button type="submit" class="btn btn-primary">✅ Create Driver</button>
                <a href="{% url 'manage-drivers' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>

</div>

</body>
</html>
